<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Team Bookmarks — Share useful links with your team</title>
    <meta
      name="description"
      content="A lightweight open source tool to manage, share and version your team's bookmarks as YAML files."
    />

    <!-- canonical + og:url are set dynamically so any self-hosted instance gets the correct URL -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="" />
    <meta property="og:title" content="Team Bookmarks — Share useful links with your team" />
    <meta
      property="og:description"
      content="A lightweight open source tool to manage, share and version your team's bookmarks as YAML files."
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Team Bookmarks — Share useful links with your team" />
    <meta
      name="twitter:description"
      content="A lightweight open source tool to manage, share and version your team's bookmarks as YAML files."
    />

    <!-- JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Team Bookmarks",
        "applicationCategory": "ProductivityApplication",
        "operatingSystem": "Any",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "license": "https://opensource.org/licenses/MIT",
        "description": "A lightweight open source tool to manage, share and version your team's bookmarks as YAML files."
      }
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
